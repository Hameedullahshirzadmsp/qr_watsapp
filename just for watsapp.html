<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Company QR Card</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        
        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            /* فاصله کمتر */
        }
        
        .header img {
            width: 80px;
            height: auto;
            margin-right: 15px;
        }
        
        .header h2 {
            font-weight: 600;
            color: #007bff;
            margin: 0;
        }
        
        h4 {
            margin: 10px 0;
            /* فاصله کمتر با QR */
        }
        
        #qrcode {
            margin: 10px auto;
            /* فاصله کمتر */
        }
        
        .btn-custom {
            margin: 8px;
            min-width: 190px;
            font-size: 15px;
        }
        
        .footer {
            margin-top: 20px;
            /* فاصله کمتر */
            font-size: 14px;
            color: #555;
        }
        
        .footer i {
            margin-right: 6px;
            color: #007bff;
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- لوگو + نام شرکت -->
        <div class="header">
            <img src="C:/Users/Ganji/Desktop/ali.png" alt="Company Logo">
            <h2>Hameedullahshirzad MSP</h2>
        </div>

        <h4 class="text-secondary">Scan My QR Code</h4>
        <div id="qrcode"></div>

        <!-- لینک‌ها -->
        <a href="https://wa.me/+93700732582" target="_blank" class="btn btn-success btn-custom">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <!-- آدرس و ایمیل -->
    <div class="footer">
        <p><i class="fas fa-map-marker-alt"></i> Shop number 106, Hameed Money Exchange and Trade Center, Kabul, Afghanistan</p>
        <p><i class="fas fa-envelope"></i> info@hameedullahshirzad.com</p>
    </div>
    </div>

    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://hameedullahshirzadmsp.github.io/qr_watsapp/link for watsapp.html", // آدرس درست
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>

</body>

</html>
