<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Choose an Option</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .menu {
            width: 100%;
            max-width: 400px;
        }
        
        .menu-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }
        
        .menu-card:hover {
            transform: scale(1.03);
        }
        
        .menu-icon {
            font-size: 28px;
            margin-right: 15px;
        }
        
        .menu-text {
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="menu">
        <div class="menu-card">
            <i class="fab fa-whatsapp menu-icon text-success"></i>
            <a href="https://wa.me/+93700732582" target="_blank" class="menu-text text-success">WhatsApp</a>
        </div>

    </div>
</body>

</html>
